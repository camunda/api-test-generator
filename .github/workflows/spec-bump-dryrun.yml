# Scheduled, non-blocking dry-run of the camunda-oca spec bump (#387).
#
# A spec-pin bump isn't always mechanical: latest upstream main can pull in a
# whole new domain the generator doesn't yet model (this bit us bumping
# camunda-oca to the agent-instance domain — see #386). Today that only shows
# up when someone manually attempts the bump. This turns "surprise at bump
# time" into a recurring, signal-only heads-up.
#
# It fetches camunda/camunda@main (instead of the pinned SHA), runs the full
# generate pipeline + regression invariants against it, and diffs the operation
# surface vs the pin. It then routes on the result:
#   - CLEAN drift (generate + invariants pass): opens/updates a rolling bump PR
#     (chore/spec-bump-camunda-oca) that re-pins to latest — ready to review/merge.
#   - BROKEN drift (generate or invariants fail): opens/updates ONE rolling
#     tracking issue instead (adopting needs modelling work first).
#   - No content change: closes the issue/PR.
#
# The bump PR is opened as the qa-processes GitHub App — the same App and Vault
# wiring camunda/camunda uses to open its nightly-fix PRs (e.g. camunda#56716) —
# so ci.yml triggers on it (the built-in GITHUB_TOKEN can't, loop-prevention).
# If the App token isn't available it FALLS BACK to the tracking-issue path, so
# the signal is never lost.
#   Prereq (one-time): the qa-processes App must be able to open PRs on
#   camunda/api-test-generator (Contents: write + Pull requests: write). Its
#   creds already live in Vault (secret/data/products/qa/ci/github.com/apps/
#   camunda/qa-processes) and this repo already has the approle secrets
#   (VAULT_ROLE_ID/SECRET_ID/ADDR). Until it can reach this repo, clean drift
#   reports via the tracking issue.
#
# NON-BLOCKING BY DESIGN: schedule + manual dispatch only, never pull_request —
# it can never fail anyone's PR. camunda-hub is intentionally NOT covered here:
# nightly-camunda-hub.yml already clones camunda-hub@main and bundles it
# unpinned every night, so the hub already gets a latest-main dry-run daily.
name: Spec-bump dry-run (camunda-oca)

on:
  schedule:
    # Mondays 06:00 UTC — a weekly heads-up, well clear of the 02:00 hub nightly.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read # push to the bump branch uses the App token, not GITHUB_TOKEN
  issues: write # tracking issue (breakage / no-token fallback)
  pull-requests: write # close a stale bump PR from the fallback/no-drift paths

concurrency:
  group: spec-bump-dryrun
  cancel-in-progress: false

env:
  CONFIG: camunda-oca
  UPSTREAM_REPO: camunda/camunda
  UPSTREAM_BRANCH: main
  # Rolling tracking issue is found by this exact title (single issue, no spam).
  ISSUE_TITLE: 'Spec-bump dry-run: camunda-oca drifted from the pin'
  DRIFT_LABEL: spec-drift

jobs:
  dryrun:
    name: Dry-run camunda-oca against upstream main
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          # Don't persist the built-in GITHUB_TOKEN as an http.extraheader: it
          # is read-only here (permissions.contents: read) and its Authorization
          # header takes precedence over the App-token URL when the bump PR is
          # pushed, causing a 403 as github-actions[bot]. The bump push supplies
          # its own credential via the qa-processes App-token URL; nothing else
          # in this job needs git auth (spec fetch is a public clone, fallbacks
          # use gh with an explicit GH_TOKEN).
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Resolve pinned + latest upstream SHA
        id: refs
        run: |
          pinned=$(node -e "console.log(JSON.parse(require('fs').readFileSync('configs/${CONFIG}/spec-pin.json','utf8')).specRef)")
          latest=$(git ls-remote "https://github.com/${UPSTREAM_REPO}.git" "refs/heads/${UPSTREAM_BRANCH}" | cut -f1)
          if [ -z "$latest" ]; then
            echo "::error::Could not resolve ${UPSTREAM_REPO}@${UPSTREAM_BRANCH} via git ls-remote"
            exit 1
          fi
          echo "pinned=${pinned}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "Pinned: ${pinned}"
          echo "Latest: ${latest}"
          if [ "$pinned" = "$latest" ]; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
            echo "Pin is already at latest main — nothing to dry-run."
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture pinned operation surface
        if: steps.refs.outputs.drifted == 'true'
        env:
          SPEC_REF: ${{ steps.refs.outputs.pinned }}
        run: |
          npm run fetch-spec:ref
          npm run -s spec-operations > /tmp/pinned-ops.txt
          echo "Pinned operations: $(wc -l < /tmp/pinned-ops.txt)"

      # Fetch latest LAST so the latest bundle is what generate + invariants see.
      - name: Fetch latest upstream spec
        if: steps.refs.outputs.drifted == 'true'
        env:
          SPEC_REF: ${{ steps.refs.outputs.latest }}
        run: |
          npm run fetch-spec:ref
          npm run -s spec-operations > /tmp/latest-ops.txt
          echo "Latest operations: $(wc -l < /tmp/latest-ops.txt)"

      - name: Diff operation surface
        id: opdiff
        if: steps.refs.outputs.drifted == 'true'
        run: |
          # comm requires both inputs sorted in the SAME collation. spec-operations
          # sorts in JS (code-point order); re-sort under LC_ALL=C so comm's byte
          # comparison matches exactly and it can't silently misbehave on a
          # locale-sorted runner.
          LC_ALL=C sort -o /tmp/pinned-ops.txt /tmp/pinned-ops.txt
          LC_ALL=C sort -o /tmp/latest-ops.txt /tmp/latest-ops.txt
          # || true: comm exits 0 anyway, but guards an empty file.
          added=$(LC_ALL=C comm -13 /tmp/pinned-ops.txt /tmp/latest-ops.txt || true)
          removed=$(LC_ALL=C comm -23 /tmp/pinned-ops.txt /tmp/latest-ops.txt || true)
          {
            echo 'added<<EOF'
            echo "$added"
            echo 'EOF'
            echo 'removed<<EOF'
            echo "$removed"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          # printf (no trailing newline) so an empty value counts 0; grep exits 1
          # on no match, so || true keeps it non-fatal under pipefail.
          n_added=$(printf '%s' "$added" | grep -c . || true)
          n_removed=$(printf '%s' "$removed" | grep -c . || true)
          echo "n_added=${n_added}" >> "$GITHUB_OUTPUT"
          echo "n_removed=${n_removed}" >> "$GITHUB_OUTPUT"
          echo "Added: ${n_added}, Removed: ${n_removed}"
          # Content change = latest bundle hash differs from the pinned one. A SHA
          # can move upstream with byte-identical spec content (unrelated commit);
          # only a real content change is worth a bump PR / tracking issue.
          pinned_hash=$(node -e "console.log(JSON.parse(require('fs').readFileSync('configs/${CONFIG}/spec-pin.json','utf8')).expectedSpecHash)")
          latest_hash=$(node -e "console.log(JSON.parse(require('fs').readFileSync('spec/${CONFIG}/bundled/spec-metadata.json','utf8')).specHash)")
          if [ "$pinned_hash" = "$latest_hash" ]; then
            echo "content_changed=false" >> "$GITHUB_OUTPUT"
            echo "Spec content is byte-identical to the pin (SHA moved, content did not)."
          else
            echo "content_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate pipeline against latest
        id: generate
        if: steps.refs.outputs.drifted == 'true'
        continue-on-error: true
        env:
          TEST_SEED: snapshot-baseline
        run: |
          npm run testsuite:generate
          npm run generate:request-validation

      - name: Regression invariants against latest
        id: invariants
        # Only meaningful if generation produced outputs.
        if: steps.refs.outputs.drifted == 'true' && steps.generate.outcome == 'success'
        continue-on-error: true
        env:
          ALLOW_SPEC_DRIFT: '1'
          TEST_SEED: snapshot-baseline
        run: npm test

      # --- Mint the qa-processes App token for the bump PR (clean drift only) --
      # Same wiring as camunda/camunda's nightly-fix workflow (which opens PRs as
      # app/qa-processes, e.g. camunda/camunda#56716): the shared composite action
      # reads the qa-processes App id + private key from Vault (approle auth via
      # VAULT_ROLE_ID/SECRET_ID — already repo secrets) and mints an installation
      # token. continue-on-error: if the App can't reach this repo yet, the token
      # is empty and routing falls back to the tracking issue.
      - name: Generate qa-processes App token
        id: app-token
        if: >-
          steps.refs.outputs.drifted == 'true' && steps.opdiff.outputs.content_changed == 'true' &&
          steps.generate.outcome == 'success' && steps.invariants.outcome == 'success'
        continue-on-error: true
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@main
        with:
          github-app-id-vault-key: GITHUB_APP_ID
          github-app-id-vault-path: secret/data/products/qa/ci/github.com/apps/camunda/qa-processes
          github-app-private-key-vault-key: GITHUB_APP_SECRET
          github-app-private-key-vault-path: secret/data/products/qa/ci/github.com/apps/camunda/qa-processes
          vault-auth-method: approle
          vault-auth-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-auth-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          vault-url: ${{ secrets.VAULT_ADDR }}

      # --- Route on the outcome ------------------------------------------------
      # CLEAN drift + App token → open/update the rolling bump PR.
      - name: Open/update the auto-bump PR
        if: >-
          steps.refs.outputs.drifted == 'true' && steps.opdiff.outputs.content_changed == 'true' &&
          steps.generate.outcome == 'success' && steps.invariants.outcome == 'success' &&
          steps.app-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          LATEST: ${{ steps.refs.outputs.latest }}
          N_ADDED: ${{ steps.opdiff.outputs.n_added }}
          N_REMOVED: ${{ steps.opdiff.outputs.n_removed }}
          ADDED: ${{ steps.opdiff.outputs.added }}
          REMOVED: ${{ steps.opdiff.outputs.removed }}
        run: bash .github/scripts/spec-bump-open-pr.sh

      # BROKEN drift (generate/invariants failed) OR clean-but-no-App-token
      # → the tracking issue (fallback preserves the signal).
      - name: Report drift to the rolling tracking issue
        if: >-
          steps.refs.outputs.drifted == 'true' && steps.opdiff.outputs.content_changed == 'true' &&
          (steps.generate.outcome != 'success' || steps.invariants.outcome != 'success' ||
           steps.app-token.outputs.token == '')
        env:
          GH_TOKEN: ${{ github.token }}
          PINNED: ${{ steps.refs.outputs.pinned }}
          LATEST: ${{ steps.refs.outputs.latest }}
          N_ADDED: ${{ steps.opdiff.outputs.n_added }}
          N_REMOVED: ${{ steps.opdiff.outputs.n_removed }}
          ADDED: ${{ steps.opdiff.outputs.added }}
          REMOVED: ${{ steps.opdiff.outputs.removed }}
          GEN_OUTCOME: ${{ steps.generate.outcome }}
          INV_OUTCOME: ${{ steps.invariants.outcome }}
        run: bash .github/scripts/spec-bump-report.sh

      # No meaningful drift (pin at latest, or content byte-identical) → close
      # any open tracking issue / bump PR.
      - name: Close tracking issue + bump PR when clean
        if: >-
          always() &&
          (steps.refs.outputs.drifted == 'false' || steps.opdiff.outputs.content_changed == 'false')
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST: ${{ steps.refs.outputs.latest }}
        run: bash .github/scripts/spec-bump-resolve.sh

      - name: Upload generated outputs
        if: steps.refs.outputs.drifted == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: spec-bump-dryrun-outputs
          path: |
            generated
            spec
            /tmp/pinned-ops.txt
            /tmp/latest-ops.txt
          if-no-files-found: warn
          retention-days: 14
