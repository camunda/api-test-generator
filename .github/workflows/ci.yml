name: PR & Branch CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Lint, typecheck, regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Check for UTF-8 BOMs
        # Git's eol normalisation does not strip BOMs and Biome does not flag
        # them; this guard fails the build on any BOM in a tracked text file.
        # See scripts/check-no-bom.sh and .editorconfig (charset = utf-8).
        run: npm run check:no-bom

      - name: Read pinned spec ref
        id: pin
        # The bundled-spec invariants are evaluated against a specific
        # upstream spec content. We fetch that ref so unrelated upstream
        # changes don't randomly fail PRs. See configs/camunda-oca/spec-pin.json
        # for the bump procedure (or configs/<config>/spec-pin.json once
        # the CONFIG matrix lands — see #128).
        run: |
          spec_ref=$(node -e "console.log(JSON.parse(require('fs').readFileSync('configs/camunda-oca/spec-pin.json','utf8')).specRef)")
          echo "spec_ref=${spec_ref}" >> "$GITHUB_OUTPUT"
          echo "Pinned spec ref: ${spec_ref}"

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck (semantic-graph-extractor)
        run: npx tsc --noEmit -p semantic-graph-extractor/tsconfig.json

      - name: Typecheck (path-analyser)
        run: npx tsc --noEmit -p path-analyser/tsconfig.json

      - name: Build path-analyser (emit .d.ts for emitter-sdk + materializer typecheck)
        run: npm run build:analyser

      - name: Typecheck (emitter-sdk)
        run: npx tsc --noEmit -p emitter-sdk/tsconfig.json

      - name: Build emitter-sdk (emit .d.ts for materializer typecheck)
        run: npm run build -w @camunda8/emitter-sdk

      - name: Typecheck (materializer)
        run: npx tsc --noEmit -p materializer/tsconfig.json

      - name: Typecheck (request-validation)
        run: npx tsc --noEmit -p request-validation/tsconfig.json

      - name: Typecheck (tests)
        # The workspace tsconfigs only include `src` (and `scripts`),
        # so test files are not type-checked by them. Without this gate
        # bugs like the one in PR #114 — passing `{ maxPerField: 4 }`
        # to `generateConstraintViolations` whose Opts only accepts
        # `{ onlyOperations, capPerOperation }` — silently slip through
        # to review. (`maxPerField` is a valid key on a *different*
        # analyser, `generateBodyTypeMismatch`, which is what made the
        # mistake easy to miss in code review.) See tests/tsconfig.json
        # for the include set.
        run: npx tsc --noEmit -p tests/tsconfig.json

      - name: Fetch pinned OpenAPI spec
        env:
          SPEC_REF: ${{ steps.pin.outputs.spec_ref }}
        run: npm run fetch-spec:ref

      - name: Regenerate pipeline outputs
        env:
          # Match the seed used to capture the baseline so any pseudo-random
          # ordering / sampling in the generators is reproducible in CI.
          TEST_SEED: snapshot-baseline
        run: |
          npm run testsuite:generate
          npm run generate:request-validation

      - name: Lint generated test suites (Biome)
        # The generation pipeline runs biome --write --unsafe on the
        # emitted suites before this step (see biome:fix-generated). This
        # gate verifies that no diagnostics survived the autofix — any
        # residual error means the emitter regressed and produced output
        # biome cannot mechanically clean. See biome.generated.json for
        # the rules applied to generated output.
        run: npm run lint:generated

      - name: Run regression + unit tests
        run: npm test

      - name: Upload pipeline outputs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-outputs
          path: |
            generated
            spec
          if-no-files-found: warn
          retention-days: 7

  # camunda-hub leg (#440 / #128 CI matrix). Runs in parallel with `regression`
  # (camunda-oca): the same lint + typecheck gates, then generates the hub suite
  # and runs the hub Layer-3 invariants. Unlike the nightly (unpinned, live Hub),
  # this leg runs against the PINNED hub spec and does NOT touch a live Hub — so
  # no backend flakiness. camunda-hub is private, so it needs a clone token (same
  # Vault → App pattern as nightly-camunda-hub.yml).
  #
  # Gating: this is a normal job that always runs (on push + same-repo PRs). It
  # only *blocks* merges once someone adds "Lint, typecheck, hub invariants" to
  # branch protection's required checks — that branch-protection toggle is the
  # on-switch, not anything in this file. Until then it's a visible pass/fail
  # signal. Enabling it as a required gate is the intended end state.
  hub-invariants:
    name: Lint, typecheck, hub invariants
    runs-on: ubuntu-latest
    # Needs Vault/App secrets to clone the private camunda-hub; fork PRs don't
    # get repo secrets, so skip there (the job would fail at the Vault step for
    # reasons unrelated to the change). Runs on push + same-repo PRs.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # OIDC → Vault (no long-lived secret stored)
    env:
      CONFIG: camunda-hub
      TEST_SEED: snapshot-baseline
    steps:
      - name: Checkout api-test-generator
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # --- lint + typecheck (config-independent; fail fast before the clone) ---
      - name: Check for UTF-8 BOMs
        run: npm run check:no-bom

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck (semantic-graph-extractor)
        run: npx tsc --noEmit -p semantic-graph-extractor/tsconfig.json

      - name: Typecheck (path-analyser)
        run: npx tsc --noEmit -p path-analyser/tsconfig.json

      - name: Build path-analyser (emit .d.ts for downstream typechecks)
        run: npm run build:analyser

      - name: Typecheck (emitter-sdk)
        run: npx tsc --noEmit -p emitter-sdk/tsconfig.json

      - name: Build emitter-sdk (emit .d.ts for materializer typecheck)
        run: npm run build -w @camunda8/emitter-sdk

      - name: Typecheck (materializer)
        run: npx tsc --noEmit -p materializer/tsconfig.json

      - name: Typecheck (request-validation)
        run: npx tsc --noEmit -p request-validation/tsconfig.json

      - name: Typecheck (tests)
        run: npx tsc --noEmit -p tests/tsconfig.json

      # --- clone the PINNED hub spec (private repo → App token) ---------------
      - name: Fetch camunda-hub GitHub App creds from Vault
        id: app-creds
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: ${{ secrets.VAULT_JWT_PATH }}
          role: ${{ secrets.VAULT_JWT_ROLE }}
          jwtGithubAudience: ${{ secrets.VAULT_JWT_AUDIENCE }}
          secrets: |
            secret/data/products/web-modeler/ci/preview-envs GITHUB_PREVIEW_ENVIRONMENTS_APP_ID | APP_ID ;
            secret/data/products/web-modeler/ci/preview-envs GITHUB_PREVIEW_ENVIRONMENTS_APP_PRIVATE_KEY | APP_PRIVATE_KEY ;

      - name: Mint camunda-hub clone token from the GitHub App
        id: hub-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ steps.app-creds.outputs.APP_ID }}
          private-key: ${{ steps.app-creds.outputs.APP_PRIVATE_KEY }}
          owner: camunda
          repositories: camunda-hub

      - name: Read pinned hub specRef
        id: pin
        run: |
          sha=$(node -e "console.log(JSON.parse(require('fs').readFileSync('configs/camunda-hub/spec-pin.json','utf8')).specRef)")
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Pinned camunda-hub specRef: ${sha}"

      # Clone the PINNED commit (not latest main — this is the deterministic
      # regression leg; the nightly is the unpinned one). Shallow fetch-by-SHA.
      - name: Clone camunda-hub @ pinned specRef (sibling ../camunda-hub)
        env:
          HUB_TOKEN: ${{ steps.hub-token.outputs.token }}
          PIN: ${{ steps.pin.outputs.sha }}
        run: |
          if [ -z "$HUB_TOKEN" ]; then
            echo "::error::No clone token — App token empty (check Vault OIDC + preview-envs role, and the App is installed on camunda/camunda-hub with Contents: Read)."
            exit 1
          fi
          dest="${GITHUB_WORKSPACE}/../camunda-hub"
          mkdir -p "$dest" && cd "$dest" && git init -q
          git remote add origin https://github.com/camunda/camunda-hub.git
          git -c "url.https://x-access-token:${HUB_TOKEN}@github.com/.insteadOf=https://github.com/" \
            fetch --depth 1 origin "$PIN"
          git checkout -q FETCH_HEAD
          echo "camunda-hub pinned at: $(git rev-parse HEAD)"

      # Local-bundle from the sibling clone (SPEC_REF ignored for hub). Generate
      # BOTH suites so PR CI catches hub generator breakage pre-merge (#440):
      # testsuite:generate writes the coverage.json + lifecycle specs the
      # invariants read; generate:request-validation exercises the hub negative
      # generator too (a crash there otherwise only surfaces in the nightly).
      # Still no live Hub.
      - name: Bundle pinned hub spec + generate
        run: |
          npm run fetch-spec
          npm run testsuite:generate
          npm run generate:request-validation

      - name: Lint generated hub suite (Biome)
        run: npm run lint:generated

      # The spec-pin globalSetup validates the bundled hash against
      # configs/camunda-hub/spec-pin.json before the invariants load; running
      # only the hub invariants file avoids OCA-assuming tests.
      - name: Run hub Layer-3 invariants
        run: npx vitest run configs/camunda-hub/regression-invariants.test.ts

      - name: Upload hub pipeline outputs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-outputs-camunda-hub
          path: |
            generated
            spec
          if-no-files-found: warn
          retention-days: 7

  # Spec-freshness heads-up: is each config's PINNED spec still current with its
  # upstream default branch? Compares by CONTENT HASH (bundles upstream main and
  # compares to the pin's expectedSpecHash) so it ignores no-op SHA moves and
  # only reacts to real spec changes. FAILS (red) when a pin is behind — a loud
  # "bump the pin" nudge (see AGENTS.md → Spec pin).
  #
  # IMPORTANT: keep this OUT of branch protection (do NOT make it a required
  # check). It intentionally depends on external state (upstream main), so a
  # spec change upstream reds every open PR until the pin is bumped — useful as a
  # visible signal, but it must not block unrelated PRs on that adoption work.
  # (The scheduled spec-bump check #434/#435 is the non-PR home for the same signal.)
  spec-freshness:
    name: Spec freshness (pins vs upstream main)
    runs-on: ubuntu-latest
    # The hub-side check needs Vault/App secrets; fork PRs don't get repo
    # secrets, so skip the whole job there (runs on push + same-repo PRs). The
    # camunda-oca half is public, but on a fork the "pin behind upstream" signal
    # is irrelevant to an external contributor's change, so skipping entirely is
    # the least-confusing choice.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # OIDC → Vault (hub clone token)
    env:
      # Mapped from the secret so step-level `if: env.VAULT_ADDR != ''` guards can
      # skip the hub-side steps when secrets are unavailable (e.g. Dependabot PRs,
      # which pass the same-repo guard above but get no secrets) — the job then
      # runs the public camunda-oca check only, instead of going red on missing
      # credentials.
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          # This job mints a separate App token for the private hub clone; don't
          # leave the default GITHUB_TOKEN persisted in .git/config.
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # --- camunda-oca (public, network-fetch) --------------------------------
      - name: camunda-oca — pin vs camunda/camunda@main
        id: oca
        run: |
          set -euo pipefail
          pin_ref=$(node -e "console.log(JSON.parse(require('fs').readFileSync('configs/camunda-oca/spec-pin.json','utf8')).specRef)")
          pin_hash=$(node -e "console.log(JSON.parse(require('fs').readFileSync('configs/camunda-oca/spec-pin.json','utf8')).expectedSpecHash)")
          latest=$(git ls-remote https://github.com/camunda/camunda.git refs/heads/main | cut -f1)
          echo "pinned=${pin_ref} latest=${latest}"
          if [ "$pin_ref" = "$latest" ]; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
            echo "camunda-oca: pin is at latest main."
            exit 0
          fi
          SPEC_REF="$latest" npm run fetch-spec:ref
          latest_hash=$(node -e "console.log(JSON.parse(require('fs').readFileSync('spec/camunda-oca/bundled/spec-metadata.json','utf8')).specHash)")
          if [ "$pin_hash" = "$latest_hash" ]; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
            echo "camunda-oca: SHA moved but spec content is unchanged — pin OK."
          else
            echo "behind=true" >> "$GITHUB_OUTPUT"
            echo "::warning title=camunda-oca pin behind upstream::pinned ${pin_ref} (${pin_hash}) vs camunda/camunda@main ${latest} (${latest_hash}). Bump configs/camunda-oca/spec-pin.json."
          fi

      # --- camunda-hub (private → App token; local-bundle) --------------------
      # Guarded on secret availability: if Vault secrets aren't present (e.g. a
      # Dependabot PR), these three steps skip and the job reports the OCA check
      # only, rather than going red on missing credentials.
      - name: Fetch camunda-hub GitHub App creds from Vault
        id: app-creds
        if: env.VAULT_ADDR != ''
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: ${{ secrets.VAULT_JWT_PATH }}
          role: ${{ secrets.VAULT_JWT_ROLE }}
          jwtGithubAudience: ${{ secrets.VAULT_JWT_AUDIENCE }}
          secrets: |
            secret/data/products/web-modeler/ci/preview-envs GITHUB_PREVIEW_ENVIRONMENTS_APP_ID | APP_ID ;
            secret/data/products/web-modeler/ci/preview-envs GITHUB_PREVIEW_ENVIRONMENTS_APP_PRIVATE_KEY | APP_PRIVATE_KEY ;

      - name: Mint camunda-hub clone token from the GitHub App
        id: hub-token
        if: env.VAULT_ADDR != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ steps.app-creds.outputs.APP_ID }}
          private-key: ${{ steps.app-creds.outputs.APP_PRIVATE_KEY }}
          owner: camunda
          repositories: camunda-hub

      - name: camunda-hub — pin vs camunda/camunda-hub@main
        id: hub
        if: env.VAULT_ADDR != ''
        env:
          CONFIG: camunda-hub
          HUB_TOKEN: ${{ steps.hub-token.outputs.token }}
        run: |
          set -euo pipefail
          if [ -z "$HUB_TOKEN" ]; then
            echo "::error::No clone token — App token empty (Vault/App auth)."
            exit 1
          fi
          pin_hash=$(node -e "console.log(JSON.parse(require('fs').readFileSync('configs/camunda-hub/spec-pin.json','utf8')).expectedSpecHash)")
          # Reuse the hub-invariants init+fetch approach (init + remote add +
          # token-rewritten fetch), adapted here to the tip of main rather than a
          # pinned SHA. `git clone -c url.insteadOf` was cloning unauthenticated
          # here ("Repository not found" on the private repo); init+fetch applies
          # the rewrite reliably. Subshell keeps cwd clean for the fetch-spec
          # bundle step below.
          dest="${GITHUB_WORKSPACE}/../camunda-hub"
          (
            mkdir -p "$dest" && cd "$dest" && git init -q
            git remote add origin https://github.com/camunda/camunda-hub.git
            git -c "url.https://x-access-token:${HUB_TOKEN}@github.com/.insteadOf=https://github.com/" \
              fetch --depth 1 origin main
            git checkout -q FETCH_HEAD
          )
          latest=$(git -C "$dest" rev-parse HEAD)
          npm run fetch-spec
          latest_hash=$(node -e "console.log(JSON.parse(require('fs').readFileSync('spec/camunda-hub/bundled/spec-metadata.json','utf8')).specHash)")
          echo "latest=${latest}"
          if [ "$pin_hash" = "$latest_hash" ]; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
            echo "camunda-hub: spec content matches the pin."
          else
            echo "behind=true" >> "$GITHUB_OUTPUT"
            echo "::warning title=camunda-hub pin behind upstream::camunda/camunda-hub@main ${latest} (${latest_hash}) vs pin (${pin_hash}). Bump configs/camunda-hub/spec-pin.json."
          fi

      - name: Fail if any pin is behind upstream
        run: |
          oca="${{ steps.oca.outputs.behind }}"
          hub="${{ steps.hub.outputs.behind }}"
          # Empty hub = the hub check was skipped (no Vault secrets); don't fail on it.
          echo "behind — camunda-oca: ${oca}, camunda-hub: ${hub:-skipped (no secrets)}"
          if [ "$oca" = "true" ] || [ "$hub" = "true" ]; then
            echo "::error::A pinned spec is behind upstream main. Bump the pin(s) above (AGENTS.md → Spec pin) or accept the drift."
            exit 1
          fi
          echo "Both pins are current with upstream main."
