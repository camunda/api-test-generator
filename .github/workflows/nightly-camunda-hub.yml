# description: Nightly API test run for camunda-hub — positive (lifecycle) +
#              negative (request-validation) suites. Clones camunda-hub @ latest
#              main, bundles its OpenAPI spec, starts a Hub SNAPSHOT, regenerates
#              both suites, runs them, and posts a results summary to Slack. The
#              run FAILS if any test's actual status != expected (strict); ops
#              with no achievable green are positive-suppressed
#              (configs/camunda-hub/positive-suppress.json) with tracking issues.
# type: CI
# owner: @camunda/test-automation-team
---
name: Nightly — camunda-hub API tests

on:
  schedule:
    # 02:00 UTC nightly. workflow_dispatch lets you trigger an ad-hoc run.
    - cron: '0 2 * * *'
  workflow_dispatch: {}

defaults:
  run:
    shell: bash

permissions:
  contents: read
  # Mint a GitHub OIDC token so Vault can authenticate this job via JWT (no
  # long-lived role-id/secret-id stored as repo secrets — smaller blast radius).
  id-token: write

# Don't pile up overlapping nightly runs.
concurrency:
  group: nightly-camunda-hub
  cancel-in-progress: true

env:
  CONFIG: camunda-hub
  HUB_UI_PORT: '8088'
  KEYCLOAK_PORT: '18080'
  # Channel to publish results to. The Slack bot must be invited to this channel
  # for chat.postMessage to succeed (`/invite @<bot>` in #camunda-hub-api-test-results).
  SLACK_CHANNEL: '#camunda-hub-api-test-results'

jobs:
  nightly-hub:
    name: Generate → run → report (positive + negative suites)
    runs-on: ubuntu-latest
    # Prebuilt image (pull + boot) + generate + run — no source build.
    timeout-minutes: 25

    steps:
      - name: Checkout api-test-generator
        uses: actions/checkout@v6
        with:
          # Short-lived GITHUB_TOKEN must not linger in .git/config — we configure
          # our own Vault-issued token below for the private camunda-hub clone.
          persist-credentials: false

      # --- Clone token for the private camunda-hub -----------------------------
      # Mint a short-lived GitHub App installation token (via Vault OIDC/JWT) to
      # clone the private repo. Shared with ci.yml + spec-bump-check — see
      # .github/actions/hub-clone-token.
      - name: Mint camunda-hub clone token
        id: hub-token
        uses: ./.github/actions/hub-clone-token
        with:
          vault-url: ${{ secrets.VAULT_ADDR }}
          vault-jwt-path: ${{ secrets.VAULT_JWT_PATH }}
          vault-jwt-role: ${{ secrets.VAULT_JWT_ROLE }}
          vault-jwt-audience: ${{ secrets.VAULT_JWT_AUDIENCE }}

      # --- Clone camunda-hub @ latest main as a sibling (../camunda-hub) -------
      # start-hub.sh and the local-bundle spec source both expect ../camunda-hub.
      # We always take latest main → "always on latest" (spec pin NOT enforced).
      # Token: the App installation token minted in the step above.
      - name: Clone camunda-hub (latest main)
        uses: ./.github/actions/clone-hub-sibling
        with:
          token: ${{ steps.hub-token.outputs.token }}
          ref: main

      # --- Toolchain -----------------------------------------------------------
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # No JDK needed: Hub runs from the prebuilt image, not built from source.

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      # --- 1. Update the OpenAPI spec to latest --------------------------------
      # Local-bundle mode: bundles straight from the sibling clone we just took
      # at latest main. No SPEC_REF, no pin enforcement (unpinned by design).
      - name: Bundle latest camunda-hub spec
        run: CONFIG=camunda-hub npm run fetch-spec

      # --- 4. Start camunda-hub (SNAPSHOT, prebuilt image) ---------------------
      # HUB_MODE=prebuilt: docker compose brings up the public camunda/hub:SNAPSHOT
      # image + keycloak/identity/db (no source build, no JDK, no registry creds).
      # ~2-3 min vs ~25 min for the from-source path.
      - name: Start Hub (prebuilt SNAPSHOT image)
        env:
          HUB_MODE: prebuilt
        run: ./docker/start-hub.sh start

      # The hub container boots asynchronously (~1-2 min for the prebuilt image),
      # so gate the test step until the API actually serves. Continuously poll the
      # v2 surface and only proceed once it returns 401 (auth required = security
      # layer wired = app serving) for several CONSECUTIVE checks. A bare "any
      # response" check is unreliable: during Spring Boot startup the port accepts
      # connections and can return 404/502/503 before the app is ready. The
      # consecutive-401 streak debounces that flapping. Dump the Hub log on timeout.
      - name: Wait for Hub to be ready
        uses: ./.github/actions/wait-for-hub
        with:
          url: http://localhost:${{ env.HUB_UI_PORT }}/api/v2/

      # --- 2,3,5,6. Regenerate, run (positive + negative), build reports -------
      # STEPS="generate run" (NO curl): the Playwright suite is the gate and its
      # HTML report is the single source of truth. The curl oracle is a generator-
      # faithfulness cross-check whose home is the generator's dev/CI loop, not an
      # unattended Hub-regression nightly — running it here only adds a noisy log
      # dump + doubled Hub requests for no kept artifact. (Run it in dev with
      # STEPS="… curl".) No E2E_SOFT: run-hub.sh exits non-zero on any Playwright
      # test failure, so this step (and the run) FAILS on failing tests. The
      # always() steps below still capture the report + write the summary.
      - name: Generate + run positive + negative suites
        env:
          # Runs the positive (lifecycle) + negative (request-validation) suites.
          # Blocked ops with no achievable green (versions #25801, catalog #25576)
          # are positive-suppressed in configs/camunda-hub/positive-suppress.json.
          STEPS: 'generate run'
          RV_PROFILES: 'secured rbac'
          # The "Bundle latest camunda-hub spec" step above already re-bundled
          # from the fresh latest-main clone, so skip run-hub.sh's own re-bundle
          # (which exists for local runs against a possibly-stale on-disk bundle).
          SKIP_BUNDLE: '1'
        run: ./scripts/e2e/run-hub.sh

      # --- Always stop Hub + collect artifacts ---------------------------------
      - name: Stop Hub
        if: always()
        run: ./docker/start-hub.sh stop || true

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: camunda-hub-nightly-reports
          path: test-results/e2e-camunda-hub/
          retention-days: 14

      # --- 7. Results summary --------------------------------------------------
      # Write per-profile Playwright pass/fail (from the JSON reporter stats) to
      # the GitHub Actions run summary. The Playwright HTML report (in the artifact)
      # has the full per-test detail + request/response attachments.
      - name: Write results to run summary
        if: always()
        uses: ./.github/actions/hub-run-summary
        with:
          heading: '## Nightly — camunda-hub API tests'

      # --- Publish to TestRail (mirrors camunda/camunda's trcli step) ----------
      # Fetch the TestRail creds from Vault via the same GitHub OIDC/JWT auth used
      # for the clone + Slack tokens (no token stored as a repo secret). Lives at
      # secret/data/products/qa/ci/common, keys TESTRAIL_QA_EMAIL/TESTRAIL_QA_KEY.
      # continue-on-error so the nightly stays green if the creds aren't in Vault
      # yet — the publish step below then skips on the empty output.
      - name: Fetch TestRail creds from Vault
        id: testrail-secrets
        if: always()
        continue-on-error: true
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: ${{ secrets.VAULT_JWT_PATH }}
          role: ${{ secrets.VAULT_JWT_ROLE }}
          jwtGithubAudience: ${{ secrets.VAULT_JWT_AUDIENCE }}
          secrets: |
            secret/data/products/qa/ci/common TESTRAIL_QA_EMAIL | TESTRAIL_USERNAME ;
            secret/data/products/qa/ci/common TESTRAIL_QA_KEY | TESTRAIL_KEY ;

      # Ingests each suite's Playwright JUnit XML into TestRail suite 101098 via
      # the TestRail CLI — one run per suite: positive (lifecycle) + each negative
      # (request-validation) profile. Gated on the Vault-fetched creds above so
      # it's dormant until they exist. Runs always() to publish failures too.
      - name: Publish results to TestRail
        id: testrail
        if: ${{ always() && steps.testrail-secrets.outputs.TESTRAIL_USERNAME != '' && steps.testrail-secrets.outputs.TESTRAIL_KEY != '' }}
        env:
          TESTRAIL_USERNAME: ${{ steps.testrail-secrets.outputs.TESTRAIL_USERNAME }}
          TESTRAIL_KEY: ${{ steps.testrail-secrets.outputs.TESTRAIL_KEY }}
          TESTRAIL_HOST: 'https://camunda.testrail.com/'
          TESTRAIL_PROJECT: 'C8'
          TESTRAIL_SUITE_ID: '101098'
        run: |
          pip install --quiet trcli==1.14.1
          out="test-results/e2e-camunda-hub"
          ts="$(date '+%Y-%m-%d %H:%M:%S')"
          # Publish one run per suite and capture its TestRail run URL into a
          # step output (<key>_url), so the run summary + Slack can link straight
          # to each run instead of the URLs being buried in this log.
          publish() { # key  junit_file  run_title
            local key="$1" f="$2" title="$3"
            if [ ! -f "$f" ]; then
              echo "skip $key — no JUnit at $f"; return
            fi
            echo "Publishing '$title' → TestRail suite ${TESTRAIL_SUITE_ID}…"
            local log; log="$(mktemp)"
            trcli -y -h "$TESTRAIL_HOST" \
              --project "$TESTRAIL_PROJECT" \
              --username "$TESTRAIL_USERNAME" \
              --key "$TESTRAIL_KEY" \
              --batch-size 500 \
              parse_junit --suite-id "$TESTRAIL_SUITE_ID" \
              --title "$title" \
              --close-run \
              -f "$f" > "$log" 2>&1 || echo "::warning::TestRail publish failed for '$title'"
            cat "$log"
            local url; url="$(grep -oE 'https://[^[:space:]]+/runs/view/[0-9]+' "$log" | head -1 || true)"
            if [ -n "$url" ]; then
              echo "${key}_url=${url}" >> "$GITHUB_OUTPUT"
              echo "- **${key}**: [${title}](${url})" >> "$GITHUB_STEP_SUMMARY"
            fi
          }
          { echo ""; echo "### TestRail runs"; } >> "$GITHUB_STEP_SUMMARY"
          publish positive "$out/pw-positive.junit.xml" "Nightly camunda-hub positive — $ts"
          publish secured  "$out/pw-secured.junit.xml"  "Nightly camunda-hub negative — secured — $ts"
          publish rbac     "$out/pw-rbac.junit.xml"     "Nightly camunda-hub negative — rbac — $ts"

      # --- Slack notification --------------------------------------------------
      # Aggregate the Playwright JSON stats into PER-SUITE pass/fail totals so the
      # positive (lifecycle) and negative (request-validation) suites each get
      # their own Slack message. positive = pw-positive.json; negative = every
      # other pw-*.json (secured, rbac, …).
      - name: Compute Playwright totals
        id: pw-totals
        if: always()
        run: |
          out="test-results/e2e-camunda-hub"
          python3 - "$out" <<'PY' >> "$GITHUB_OUTPUT"
          import glob, json, os, sys
          out = sys.argv[1]
          def agg(files):
              p = f = 0
              for fn in files:
                  try:
                      s = json.load(open(fn)).get("stats", {})
                  except Exception:
                      continue
                  p += s.get("expected", 0)
                  f += s.get("unexpected", 0)
              return p, f
          # glob returns only existing files, so an empty list means the suite
          # wrote no report (e.g. crashed before the reporters ran). Emit a "no
          # report" sentinel instead of a misleading "0 passed / 0 failed" that
          # would look green — matches the run-summary step's handling.
          def summary(files):
              if not files:
                  return "⚠️ no report — the suite may have crashed before writing results"
              p, f = agg(files)
              return f"✅ {p} passed · ❌ {f} failed"
          allf = glob.glob(os.path.join(out, "pw-*.json"))
          pos = [x for x in allf if os.path.basename(x) == "pw-positive.json"]
          neg = [x for x in allf if os.path.basename(x) != "pw-positive.json"]
          print(f"positive_summary={summary(pos)}")
          print(f"negative_summary={summary(neg)}")
          # Config drift: positive-suppress entries no longer in the bundled
          # spec (materializer records these instead of failing generate).
          stale = []
          try:
              stale = json.load(open("generated/camunda-hub/playwright/coverage.json")).get("staleSuppressedOpIds", [])
          except Exception:
              pass
          print(f"stale_suppress={', '.join(stale)}")
          PY

      # Derive the "skipped due to known issues" bullet lists straight from the
      # suppress/exclude configs (single source of truth — no hand-maintained
      # duplicate). Each relevant entry carries a `knownIssue { summary, url,
      # tracker? }`; entries without one (e.g. the out-of-scope cluster ops) are
      # omitted. Bullets are deduped by issue url (all 5 version ops → one
      # #25801 line). Emitted with literal `\n` so they slot into the Slack JSON.
      - name: Derive known-issue bullets
        id: known-issues
        if: always()
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          def ref(url):
              num = url.rstrip("/").split("/")[-1]
              return ("camunda-hub#" if "/camunda-hub/" in url else "#") + num
          def esc(s):
              # Each bullet is interpolated into the Slack payload JSON string, so
              # escape JSON-sensitive chars (backslash, double-quote) — a summary
              # like `C:\path` or one containing `"` must not break the JSON. The
              # literal `\n` line separator is added by join() *after* escaping,
              # so it survives as a valid JSON newline.
              return s.replace("\\", "\\\\").replace('"', '\\"')
          # Fully defensive: positive-suppress.json isn't schema-validated for
          # knownIssue, so tolerate any malformed shape (non-dict entry, missing
          # or non-string summary/url) by skipping it — never throw and break the
          # nightly reporting.
          def bullets(known_issues):
              seen, lines = set(), []
              for ki in known_issues:
                  if not isinstance(ki, dict):
                      continue
                  url = ki.get("url")
                  summary = ki.get("summary")
                  if not isinstance(url, str) or not url or url in seen:
                      continue
                  if not isinstance(summary, str) or not summary:
                      continue
                  seen.add(url)
                  line = f"• {summary} — <{url}|{ref(url)}>"
                  tr = ki.get("tracker")
                  if isinstance(tr, str) and tr:
                      line += f" (tracked via <{tr}|{ref(tr)}>)"
                  lines.append(esc(line))
              return "\\n".join(lines)
          def cfg(p):
              try:
                  d = json.load(open(p))
                  return d if isinstance(d, dict) else {}
              except Exception:
                  return {}
          def as_list(v):
              return v if isinstance(v, list) else []
          # Per-op knownIssue (from suppress/exclude entries) + suite-wide
          # top-level knownIssues[] (skips not tied to a single op, e.g. the
          # generator-level wrong-type-key skip). Guards for list/dict shapes so
          # a wrong JSON shape can't throw here.
          def known(c, entries_key):
              perop = [
                  e["knownIssue"]
                  for e in as_list(c.get(entries_key))
                  if isinstance(e, dict) and e.get("knownIssue")
              ]
              return perop + as_list(c.get("knownIssues"))
          pos = cfg("configs/camunda-hub/positive-suppress.json")
          neg = cfg("configs/camunda-hub/request-validation.json")
          print(f"positive_known_issues={bullets(known(pos, 'suppress'))}")
          print(f"negative_known_issues={bullets(known(neg, 'excludeOperations'))}")
          PY

      # Fetch the Slack bot token from Vault via the same GitHub OIDC/JWT auth used
      # for the clone token (no token stored as a repo secret). Lives at
      # secret/data/products/qa/ci/common, key SLACK_BOT_USER_OAUTH_TOKEN — the
      # bound Vault role must be granted read on that path. always() so a failed
      # run still notifies. The bot must be invited to #camunda-hub-api-test-results.
      # Notification infra must not fail an otherwise-complete run — continue-on-
      # error, and the Notify steps skip on the empty token output. Shared with
      # spec-bump-check — see .github/actions/slack-token.
      - name: Fetch Slack bot token from Vault
        id: slack-secrets
        if: always()
        continue-on-error: true
        uses: ./.github/actions/slack-token
        with:
          vault-url: ${{ secrets.VAULT_ADDR }}
          vault-jwt-path: ${{ secrets.VAULT_JWT_PATH }}
          vault-jwt-role: ${{ secrets.VAULT_JWT_ROLE }}
          vault-jwt-audience: ${{ secrets.VAULT_JWT_AUDIENCE }}

      - name: Notify Slack (positive suite)
        id: slack-positive
        if: ${{ always() && steps.slack-secrets.outputs.SLACK_BOT_TOKEN != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ steps.slack-secrets.outputs.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.SLACK_CHANNEL }}",
              "text": "🎭 *camunda-hub positive (lifecycle) suite (SNAPSHOT)*\n${{ steps.pw-totals.outputs.positive_summary }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|📊 View run>${{ steps.testrail.outputs.positive_url != '' && format(' · <{0}|📋 positive>', steps.testrail.outputs.positive_url) || '' }}${{ steps.pw-totals.outputs.stale_suppress != '' && format('\n⚠️ config drift: positive-suppress lists `{0}` not in the current spec — update it.', steps.pw-totals.outputs.stale_suppress) || '' }}"
            }

      # Threaded reply listing the known issues that cause positive ops to be
      # suppressed. Auto-derived from the `knownIssue` fields in
      # configs/camunda-hub/positive-suppress.json by the "Derive known-issue
      # bullets" step above — no manual sync needed.
      - name: Notify Slack (positive — known issues)
        if: ${{ always() && steps.slack-secrets.outputs.SLACK_BOT_TOKEN != '' && steps.slack-positive.outputs.ts != '' && steps.known-issues.outputs.positive_known_issues != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ steps.slack-secrets.outputs.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.SLACK_CHANNEL }}",
              "thread_ts": "${{ steps.slack-positive.outputs.ts }}",
              "text": "ℹ️ Some operations are skipped in the positive suite due to known issues:\n${{ steps.known-issues.outputs.positive_known_issues }}"
            }

      - name: Notify Slack (negative suite)
        id: slack-negative
        if: ${{ always() && steps.slack-secrets.outputs.SLACK_BOT_TOKEN != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ steps.slack-secrets.outputs.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.SLACK_CHANNEL }}",
              "text": "🎭 *camunda-hub negative (request-validation) suite (SNAPSHOT)*\n${{ steps.pw-totals.outputs.negative_summary }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|📊 View run>${{ steps.testrail.outputs.secured_url != '' && format(' · <{0}|📋 secured>', steps.testrail.outputs.secured_url) || '' }}${{ steps.testrail.outputs.rbac_url != '' && format(' · <{0}|📋 rbac>', steps.testrail.outputs.rbac_url) || '' }}"
            }

      # Threaded reply listing the known issues that cause negative ops to be
      # excluded. Auto-derived from the `knownIssue`/`knownIssues` fields in
      # configs/camunda-hub/request-validation.json by the "Derive known-issue
      # bullets" step above — no manual sync needed.
      - name: Notify Slack (negative — known issues)
        if: ${{ always() && steps.slack-secrets.outputs.SLACK_BOT_TOKEN != '' && steps.slack-negative.outputs.ts != '' && steps.known-issues.outputs.negative_known_issues != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ steps.slack-secrets.outputs.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.SLACK_CHANNEL }}",
              "thread_ts": "${{ steps.slack-negative.outputs.ts }}",
              "text": "ℹ️ Some operations are skipped in the negative suite due to known issues:\n${{ steps.known-issues.outputs.negative_known_issues }}"
            }
