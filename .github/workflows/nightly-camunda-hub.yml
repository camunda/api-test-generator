# description: Nightly API test run for camunda-hub — positive (lifecycle) +
#              negative (request-validation) suites. Clones camunda-hub @ latest
#              main, bundles its OpenAPI spec, starts a Hub SNAPSHOT, regenerates
#              both suites, runs them, and posts a results summary to Slack. The
#              run FAILS if any test's actual status != expected (strict); ops
#              with no achievable green are positive-suppressed
#              (configs/camunda-hub/positive-suppress.json) with tracking issues.
# type: CI
# owner: @camunda/test-automation-team
---
name: Nightly — camunda-hub API tests

on:
  schedule:
    # 02:00 UTC nightly. workflow_dispatch lets you trigger an ad-hoc run.
    - cron: '0 2 * * *'
  workflow_dispatch: {}
  # TEMPORARY (testing): trigger on push to the positive-nightly branch so the
  # end-to-end run + Slack publish can be exercised on demand. REMOVE before
  # merging to main — the nightly should only run on schedule/dispatch.
  push:
    branches:
      - feat/hub-positive-nightly

defaults:
  run:
    shell: bash

permissions:
  contents: read
  # Mint a GitHub OIDC token so Vault can authenticate this job via JWT (no
  # long-lived role-id/secret-id stored as repo secrets — smaller blast radius).
  id-token: write

# Don't pile up overlapping nightly runs.
concurrency:
  group: nightly-camunda-hub
  cancel-in-progress: true

env:
  CONFIG: camunda-hub
  HUB_UI_PORT: '8088'
  KEYCLOAK_PORT: '18080'
  # Channel to publish results to. The Slack bot must be invited to this channel
  # for chat.postMessage to succeed (`/invite @<bot>`).
  # TEMPORARY (testing): pointed at #prj-qa-sandbox. Restore
  # #camunda-hub-api-test-results before merging to main.
  SLACK_CHANNEL: '#prj-qa-sandbox'

jobs:
  nightly-hub:
    name: Generate → run → report (positive + negative suites)
    runs-on: ubuntu-latest
    # Prebuilt image (pull + boot) + generate + run — no source build.
    timeout-minutes: 25

    steps:
      - name: Checkout api-test-generator
        uses: actions/checkout@v6
        with:
          # Short-lived GITHUB_TOKEN must not linger in .git/config — we configure
          # our own Vault-issued token below for the private camunda-hub clone.
          persist-credentials: false

      # --- Clone token for the private camunda-hub -----------------------------
      # The private camunda-hub clone uses a short-lived GitHub App installation
      # token (not a personal PAT). We fetch the App credentials from Vault via
      # GitHub OIDC/JWT (no long-lived secret stored — GitHub mints a per-run OIDC
      # token, see `id-token: write` above, which Vault's JWT backend validates
      # against a role bound to this repo), then mint an installation token scoped
      # to camunda/camunda-hub from them.
      #
      # Requires (both on the Vault side, granted to this repo's JWT role):
      #   - read on secret/data/products/web-modeler/ci/preview-envs, holding
      #     GITHUB_PREVIEW_ENVIRONMENTS_APP_ID + _APP_PRIVATE_KEY
      # And on the GitHub side: that App installed on camunda/camunda-hub with
      # Contents: Read (without it, token minting below 403s).
      - name: Fetch camunda-hub GitHub App creds from Vault
        id: app-creds
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: ${{ secrets.VAULT_JWT_PATH }}
          role: ${{ secrets.VAULT_JWT_ROLE }}
          jwtGithubAudience: ${{ secrets.VAULT_JWT_AUDIENCE }}
          secrets: |
            secret/data/products/web-modeler/ci/preview-envs GITHUB_PREVIEW_ENVIRONMENTS_APP_ID | APP_ID ;
            secret/data/products/web-modeler/ci/preview-envs GITHUB_PREVIEW_ENVIRONMENTS_APP_PRIVATE_KEY | APP_PRIVATE_KEY ;

      - name: Mint camunda-hub clone token from the GitHub App
        id: hub-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ steps.app-creds.outputs.APP_ID }}
          private-key: ${{ steps.app-creds.outputs.APP_PRIVATE_KEY }}
          owner: camunda
          repositories: camunda-hub

      # --- Clone camunda-hub @ latest main as a sibling (../camunda-hub) -------
      # start-hub.sh and the local-bundle spec source both expect ../camunda-hub.
      # We always take latest main → "always on latest" (spec pin NOT enforced).
      # Token: the App installation token minted in the step above.
      - name: Clone camunda-hub (latest main)
        env:
          HUB_TOKEN: ${{ steps.hub-token.outputs.token }}
        run: |
          if [ -z "$HUB_TOKEN" ]; then
            echo "::error::No clone token — App installation token was empty (check Vault OIDC auth + role read on web-modeler/ci/preview-envs, and that the App is installed on camunda/camunda-hub with Contents: Read)."
            exit 1
          fi
          # Scope the token rewrite to this single clone (via `git -c`) rather than
          # persisting it in ~/.gitconfig — nothing with the token is left on disk.
          git -c "url.https://x-access-token:${HUB_TOKEN}@github.com/.insteadOf=https://github.com/" \
            clone --depth 1 https://github.com/camunda/camunda-hub.git "${GITHUB_WORKSPACE}/../camunda-hub"
          echo "camunda-hub at: $(cd "${GITHUB_WORKSPACE}/../camunda-hub" && git rev-parse HEAD)"

      # --- Toolchain -----------------------------------------------------------
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # No JDK needed: Hub runs from the prebuilt image, not built from source.

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      # --- 1. Update the OpenAPI spec to latest --------------------------------
      # Local-bundle mode: bundles straight from the sibling clone we just took
      # at latest main. No SPEC_REF, no pin enforcement (unpinned by design).
      - name: Bundle latest camunda-hub spec
        run: CONFIG=camunda-hub npm run fetch-spec

      # --- 4. Start camunda-hub (SNAPSHOT, prebuilt image) ---------------------
      # HUB_MODE=prebuilt: docker compose brings up the public camunda/hub:SNAPSHOT
      # image + keycloak/identity/db (no source build, no JDK, no registry creds).
      # ~2-3 min vs ~25 min for the from-source path.
      - name: Start Hub (prebuilt SNAPSHOT image)
        env:
          HUB_MODE: prebuilt
        run: ./docker/start-hub.sh start

      # The hub container boots asynchronously (~1-2 min for the prebuilt image),
      # so gate the test step until the API actually serves. Continuously poll the
      # v2 surface and only proceed once it returns 401 (auth required = security
      # layer wired = app serving) for several CONSECUTIVE checks. A bare "any
      # response" check is unreliable: during Spring Boot startup the port accepts
      # connections and can return 404/502/503 before the app is ready. The
      # consecutive-401 streak debounces that flapping. Dump the Hub log on timeout.
      - name: Wait for Hub to be ready
        run: |
          url="http://localhost:${HUB_UI_PORT}/api/v2/"
          echo "Waiting for Hub at $url (image pull + boot, up to 10m)..."
          deadline=$(( SECONDS + 600 )); streak=0; need=3; last=""
          while :; do
            code=$(curl -s -m 5 -o /dev/null -w '%{http_code}' "$url" 2>/dev/null || echo 000)
            if [ "$code" = "401" ]; then
              streak=$(( streak + 1 ))
            else
              [ "$code" != "$last" ] && echo "  …not ready yet (HTTP $code)"
              streak=0
            fi
            last="$code"
            if [ "$streak" -ge "$need" ]; then
              echo "Hub ready (HTTP 401 x$need consecutive after ${SECONDS}s)."
              break
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Hub did not become ready within 10m (last code: $code)"
              echo "----- docker logs hub (tail) -----"
              docker logs --tail 150 hub 2>&1 || echo "(no hub container log)"
              exit 1
            fi
            sleep 5
          done

      # --- 2,3,5,6. Regenerate, run (positive + negative), build reports -------
      # STEPS="generate run" (NO curl): the Playwright suite is the gate and its
      # HTML report is the single source of truth. The curl oracle is a generator-
      # faithfulness cross-check whose home is the generator's dev/CI loop, not an
      # unattended Hub-regression nightly — running it here only adds a noisy log
      # dump + doubled Hub requests for no kept artifact. (Run it in dev with
      # STEPS="… curl".) No E2E_SOFT: run-hub.sh exits non-zero on any Playwright
      # test failure, so this step (and the run) FAILS on failing tests. The
      # always() steps below still capture the report + write the summary.
      - name: Generate + run positive + negative suites
        env:
          # Runs the positive (lifecycle) + negative (request-validation) suites.
          # Blocked ops with no achievable green (versions #25801, catalog #25576)
          # are positive-suppressed in configs/camunda-hub/positive-suppress.json.
          STEPS: 'generate run'
          RV_PROFILES: 'secured rbac'
        run: ./scripts/e2e/run-hub.sh

      # --- Always stop Hub + collect artifacts ---------------------------------
      - name: Stop Hub
        if: always()
        run: ./docker/start-hub.sh stop || true

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: camunda-hub-nightly-reports
          path: test-results/e2e-camunda-hub/
          retention-days: 14

      # --- 7. Results summary --------------------------------------------------
      # Write per-profile Playwright pass/fail (from the JSON reporter stats) to
      # the GitHub Actions run summary. The Playwright HTML report (in the artifact)
      # has the full per-test detail + request/response attachments.
      - name: Write results to run summary
        if: always()
        run: |
          out="test-results/e2e-camunda-hub"
          summarize() { # profile
            local f="$out/pw-$1.json"
            if [ -f "$f" ]; then
              python3 -c "import json; s=json.load(open('$f')).get('stats',{}); print(f\"- **$1**: {s.get('expected',0)} passed, {s.get('unexpected',0)} failed, {s.get('skipped',0)} skipped\")"
            else
              echo "- **$1**: (no report — run may have failed before this profile)"
            fi
          }
          {
            echo "## Nightly — camunda-hub API tests"
            echo "### Positive (lifecycle)"
            summarize positive
            echo ""
            echo "### Negative (request-validation)"
            summarize secured
            summarize rbac
          } >> "$GITHUB_STEP_SUMMARY"

      # --- Publish to TestRail (mirrors camunda/camunda's trcli step) ----------
      # Fetch the TestRail creds from Vault via the same GitHub OIDC/JWT auth used
      # for the clone + Slack tokens (no token stored as a repo secret). Lives at
      # secret/data/products/qa/ci/common, keys TESTRAIL_QA_EMAIL/TESTRAIL_QA_KEY.
      # continue-on-error so the nightly stays green if the creds aren't in Vault
      # yet — the publish step below then skips on the empty output.
      - name: Fetch TestRail creds from Vault
        id: testrail-secrets
        if: always()
        continue-on-error: true
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: ${{ secrets.VAULT_JWT_PATH }}
          role: ${{ secrets.VAULT_JWT_ROLE }}
          jwtGithubAudience: ${{ secrets.VAULT_JWT_AUDIENCE }}
          secrets: |
            secret/data/products/qa/ci/common TESTRAIL_QA_EMAIL | TESTRAIL_USERNAME ;
            secret/data/products/qa/ci/common TESTRAIL_QA_KEY | TESTRAIL_KEY ;

      # Ingests each profile's Playwright JUnit XML into TestRail suite 101098 via
      # the TestRail CLI. Gated on the Vault-fetched creds above so it's dormant
      # until they exist. Runs always() to publish failures too.
      - name: Publish results to TestRail
        if: ${{ always() && steps.testrail-secrets.outputs.TESTRAIL_USERNAME != '' && steps.testrail-secrets.outputs.TESTRAIL_KEY != '' }}
        env:
          TESTRAIL_USERNAME: ${{ steps.testrail-secrets.outputs.TESTRAIL_USERNAME }}
          TESTRAIL_KEY: ${{ steps.testrail-secrets.outputs.TESTRAIL_KEY }}
          TESTRAIL_HOST: 'https://camunda.testrail.com/'
          TESTRAIL_PROJECT: 'C8'
          TESTRAIL_SUITE_ID: '101098'
        run: |
          pip install --quiet trcli==1.14.1
          out="test-results/e2e-camunda-hub"
          for p in secured rbac; do
            f="$out/pw-$p.junit.xml"
            if [ ! -f "$f" ]; then
              echo "skip $p — no JUnit at $f"; continue
            fi
            echo "Publishing $p → TestRail suite ${TESTRAIL_SUITE_ID}…"
            trcli -y -h "$TESTRAIL_HOST" \
              --project "$TESTRAIL_PROJECT" \
              --username "$TESTRAIL_USERNAME" \
              --key "$TESTRAIL_KEY" \
              --batch-size 500 \
              parse_junit --suite-id "$TESTRAIL_SUITE_ID" \
              --title "Nightly camunda-hub negative — ${p} — $(date '+%Y-%m-%d %H:%M:%S')" \
              --close-run \
              -f "$f" || echo "::warning::TestRail publish failed for profile '$p'"
          done

      # --- Slack notification --------------------------------------------------
      # Aggregate the Playwright JSON stats into PER-SUITE pass/fail/flaky/skipped
      # totals so the positive (lifecycle) and negative (request-validation)
      # suites each get their own Slack message. positive = pw-positive.json;
      # negative = every other pw-*.json (secured, rbac, …).
      - name: Compute Playwright totals
        id: pw-totals
        if: always()
        run: |
          out="test-results/e2e-camunda-hub"
          python3 - "$out" <<'PY' >> "$GITHUB_OUTPUT"
          import glob, json, os, sys
          out = sys.argv[1]
          def agg(files):
              p = f = fl = sk = 0
              for fn in files:
                  try:
                      s = json.load(open(fn)).get("stats", {})
                  except Exception:
                      continue
                  p  += s.get("expected", 0)
                  f  += s.get("unexpected", 0)
                  fl += s.get("flaky", 0)
                  sk += s.get("skipped", 0)
              return p, f, fl, sk
          allf = glob.glob(os.path.join(out, "pw-*.json"))
          pos = [x for x in allf if os.path.basename(x) == "pw-positive.json"]
          neg = [x for x in allf if os.path.basename(x) != "pw-positive.json"]
          for prefix, files in (("positive", pos), ("negative", neg)):
              p, f, fl, sk = agg(files)
              print(f"{prefix}_passed={p}")
              print(f"{prefix}_failed={f}")
              print(f"{prefix}_flaky={fl}")
              print(f"{prefix}_skipped={sk}")
          PY

      # Fetch the Slack bot token from Vault via the same GitHub OIDC/JWT auth used
      # for the clone token (no token stored as a repo secret). Lives at
      # secret/data/products/qa/ci/common, key SLACK_BOT_USER_OAUTH_TOKEN — the
      # bound Vault role must be granted read on that path. always() so a failed
      # run still notifies. The bot must be invited to #camunda-hub-api-test-results.
      - name: Fetch Slack bot token from Vault
        id: slack-secrets
        if: always()
        # Notification infra must not fail an otherwise-complete run — if the
        # Vault fetch fails (path/permission not ready), the Notify Slack step
        # below simply skips on the empty token output (matches the TestRail step).
        continue-on-error: true
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: ${{ secrets.VAULT_JWT_PATH }}
          role: ${{ secrets.VAULT_JWT_ROLE }}
          jwtGithubAudience: ${{ secrets.VAULT_JWT_AUDIENCE }}
          secrets: |
            secret/data/products/qa/ci/common SLACK_BOT_USER_OAUTH_TOKEN | SLACK_BOT_TOKEN ;

      - name: Notify Slack (positive suite)
        if: ${{ always() && steps.slack-secrets.outputs.SLACK_BOT_TOKEN != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ steps.slack-secrets.outputs.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.SLACK_CHANNEL }}",
              "text": "🎭 *camunda-hub positive (lifecycle) suite* (SNAPSHOT)\n✅ ${{ steps.pw-totals.outputs.positive_passed }} | ❌ ${{ steps.pw-totals.outputs.positive_failed }} | 🟡 ${{ steps.pw-totals.outputs.positive_flaky }} | ⏩ ${{ steps.pw-totals.outputs.positive_skipped }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|📊 View run>"
            }

      - name: Notify Slack (negative suite)
        if: ${{ always() && steps.slack-secrets.outputs.SLACK_BOT_TOKEN != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ steps.slack-secrets.outputs.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.SLACK_CHANNEL }}",
              "text": "🎭 *camunda-hub negative (request-validation) suite* (SNAPSHOT)\n✅ ${{ steps.pw-totals.outputs.negative_passed }} | ❌ ${{ steps.pw-totals.outputs.negative_failed }} | 🟡 ${{ steps.pw-totals.outputs.negative_flaky }} | ⏩ ${{ steps.pw-totals.outputs.negative_skipped }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|📊 View run>"
            }
