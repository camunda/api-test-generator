# description: Nightly request-validation (negative) test run for camunda-hub.
#              Clones camunda-hub @ latest main, bundles its OpenAPI spec, starts
#              a Hub SNAPSHOT, regenerates the negative test suite, runs it, and
#              posts a results summary to Slack. Positive (lifecycle) tests are
#              skipped until camunda/camunda-hub#25146 lands. The run FAILS if any
#              test's actual status != expected (strict). NOTE: ~102 secured
#              mismatches are currently known generator-gap false-positives
#              (#352/#363/#372), so the run will be red until those are fixed.
# type: CI
# owner: @camunda/<your-team>
---
name: Nightly — camunda-hub negative tests

on:
  schedule:
    # 02:00 UTC nightly. workflow_dispatch lets you trigger an ad-hoc run.
    - cron: '0 2 * * *'
  workflow_dispatch: {}
  # TEMP: run on every push to this branch while we validate the workflow in CI.
  # Remove this `push:` block before merging — the nightly should be schedule-only.
  push:
    branches:
      - feat/nightly-camunda-hub

defaults:
  run:
    shell: bash

permissions:
  contents: read

# Don't pile up overlapping nightly runs.
concurrency:
  group: nightly-camunda-hub
  cancel-in-progress: true

env:
  CONFIG: camunda-hub
  HUB_UI_PORT: '8088'
  KEYCLOAK_PORT: '18080'
  # Channel to publish results to. The Slack bot must be invited to this channel
  # for chat.postMessage to succeed (`/invite @<bot>` in #prj-qa-sandbox).
  SLACK_CHANNEL: '#prj-qa-sandbox'

jobs:
  nightly-hub:
    name: Generate → run → report (negative suite)
    runs-on: ubuntu-latest
    # Prebuilt image (pull + boot) + generate + run — no source build.
    timeout-minutes: 25

    # Map secrets into job env: the `secrets` context is NOT allowed in a step
    # `if:`, but `env` is. Empty when a secret is unset.
    # HUB_REPO_TOKEN (TEMP, until Vault onboarding): PAT to clone camunda-hub —
    # still needed because the OpenAPI spec is bundled from the (private) source
    # clone. The Hub itself runs from the PUBLIC camunda/hub:SNAPSHOT image, so no
    # Camunda container-registry credentials are required.
    env:
      HUB_REPO_TOKEN: ${{ secrets.HUB_REPO_TOKEN }}

    steps:
      - name: Checkout api-test-generator
        uses: actions/checkout@v6
        with:
          # Short-lived GITHUB_TOKEN must not linger in .git/config — we configure
          # our own Vault-issued token below for the private camunda-hub clone.
          persist-credentials: false

      # --- GitHub App token to clone the private camunda-hub -------------------
      # Mirrors camunda-hub's own preview-env workflows: mint a short-lived
      # GitHub App token from App credentials stored in Vault (AppRole auth).
      # Prereq (infra/infraex): camunda/api-test-generator must have the Vault
      # secrets VAULT_ADDR / VAULT_ROLE_ID / VAULT_SECRET_ID, and its Vault role
      # must be granted read on secret/data/products/web-modeler/ci/common. The
      # app must have Contents:Read on camunda/camunda-hub.
      #
      # TEMP workaround: while Vault onboarding is pending, set a repo secret
      # HUB_REPO_TOKEN (a PAT with Contents:Read on camunda-hub). When present it
      # is used for the clone and this Vault step is skipped. Remove HUB_REPO_TOKEN
      # (and this `if:`) once Vault is live.
      - name: Generate camunda-hub clone token
        id: hub-token
        if: ${{ env.HUB_REPO_TOKEN == '' }}
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@main
        with:
          github-app-id-vault-key: GITHUB_PREVIEW_ENVIRONMENTS_APP_ID
          github-app-id-vault-path: secret/data/products/web-modeler/ci/common
          github-app-private-key-vault-key: GITHUB_PREVIEW_ENVIRONMENTS_APP_PRIVATE_KEY
          github-app-private-key-vault-path: secret/data/products/web-modeler/ci/common
          vault-auth-method: approle
          vault-auth-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-auth-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          vault-url: ${{ secrets.VAULT_ADDR }}
          owner: camunda
          repositories: camunda-hub

      # --- Clone camunda-hub @ latest main as a sibling (../camunda-hub) -------
      # start-hub.sh and the local-bundle spec source both expect ../camunda-hub.
      # We always take latest main → "always on latest" (spec pin NOT enforced).
      # Token: HUB_REPO_TOKEN (temp PAT) if set, else the Vault-minted App token.
      - name: Clone camunda-hub (latest main)
        env:
          HUB_TOKEN: ${{ env.HUB_REPO_TOKEN != '' && env.HUB_REPO_TOKEN || steps.hub-token.outputs.token }}
        run: |
          if [ -z "$HUB_TOKEN" ]; then
            echo "::error::No clone token available — set HUB_REPO_TOKEN, or complete Vault onboarding (VAULT_ADDR/VAULT_ROLE_ID/VAULT_SECRET_ID)."
            exit 1
          fi
          git config --global url."https://x-access-token:${HUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --depth 1 https://github.com/camunda/camunda-hub.git "${GITHUB_WORKSPACE}/../camunda-hub"
          echo "camunda-hub at: $(cd "${GITHUB_WORKSPACE}/../camunda-hub" && git rev-parse HEAD)"

      # --- Toolchain -----------------------------------------------------------
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # No JDK needed: Hub runs from the prebuilt image, not built from source.

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      # --- 1. Update the OpenAPI spec to latest --------------------------------
      # Local-bundle mode: bundles straight from the sibling clone we just took
      # at latest main. No SPEC_REF, no pin enforcement (unpinned by design).
      - name: Bundle latest camunda-hub spec
        run: CONFIG=camunda-hub npm run fetch-spec

      # --- 4. Start camunda-hub (SNAPSHOT, prebuilt image) ---------------------
      # HUB_MODE=prebuilt: docker compose brings up the public camunda/hub:SNAPSHOT
      # image + keycloak/identity/db (no source build, no JDK, no registry creds).
      # ~2-3 min vs ~25 min for the from-source path.
      - name: Start Hub (prebuilt SNAPSHOT image)
        env:
          HUB_MODE: prebuilt
        run: ./docker/start-hub.sh start

      # The hub container boots asynchronously (~1-2 min for the prebuilt image),
      # so gate the test step until the API actually serves. Continuously poll the
      # v2 surface and only proceed once it returns 401 (auth required = security
      # layer wired = app serving) for several CONSECUTIVE checks. A bare "any
      # response" check is unreliable: during Spring Boot startup the port accepts
      # connections and can return 404/502/503 before the app is ready. The
      # consecutive-401 streak debounces that flapping. Dump the Hub log on timeout.
      - name: Wait for Hub to be ready
        run: |
          url="http://localhost:${HUB_UI_PORT}/api/v2/"
          echo "Waiting for Hub at $url (image pull + boot, up to 10m)..."
          deadline=$(( SECONDS + 600 )); streak=0; need=3; last=""
          while :; do
            code=$(curl -s -m 5 -o /dev/null -w '%{http_code}' "$url" 2>/dev/null || echo 000)
            if [ "$code" = "401" ]; then
              streak=$(( streak + 1 ))
            else
              [ "$code" != "$last" ] && echo "  …not ready yet (HTTP $code)"
              streak=0
            fi
            last="$code"
            if [ "$streak" -ge "$need" ]; then
              echo "Hub ready (HTTP 401 x$need consecutive after ${SECONDS}s)."
              break
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Hub did not become ready within 10m (last code: $code)"
              echo "----- docker logs hub (tail) -----"
              docker logs --tail 150 hub 2>&1 || echo "(no hub container log)"
              exit 1
            fi
            sleep 5
          done

      # --- 2,3,5,6. Skip positive, regenerate, run, build reports --------------
      # STEPS="generate run" (NO curl): the Playwright suite is the gate and its
      # HTML report is the single source of truth. The curl oracle is a generator-
      # faithfulness cross-check whose home is the generator's dev/CI loop, not an
      # unattended Hub-regression nightly — running it here only adds a noisy log
      # dump + doubled Hub requests for no kept artifact. (Run it in dev with
      # STEPS="… curl".) No E2E_SOFT: run-hub.sh exits non-zero on any Playwright
      # test failure, so this step (and the run) FAILS on failing tests. The
      # always() steps below still capture the report + write the summary.
      - name: Generate + run negative suite
        env:
          SKIP_POSITIVE: '1'
          STEPS: 'generate run'
          RV_PROFILES: 'secured rbac'
        run: ./scripts/e2e/run-hub.sh

      # --- Always stop Hub + collect artifacts ---------------------------------
      - name: Stop Hub
        if: always()
        run: ./docker/start-hub.sh stop || true

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: camunda-hub-nightly-reports
          path: test-results/e2e-camunda-hub/
          retention-days: 14

      # --- 7. Results summary --------------------------------------------------
      # Write per-profile Playwright pass/fail (from the JSON reporter stats) to
      # the GitHub Actions run summary. The Playwright HTML report (in the artifact)
      # has the full per-test detail + request/response attachments.
      - name: Write results to run summary
        if: always()
        run: |
          out="test-results/e2e-camunda-hub"
          summarize() { # profile
            local f="$out/pw-$1.json"
            if [ -f "$f" ]; then
              python3 -c "import json; s=json.load(open('$f')).get('stats',{}); print(f\"- **$1**: {s.get('expected',0)} passed, {s.get('unexpected',0)} failed, {s.get('skipped',0)} skipped\")"
            else
              echo "- **$1**: (no report — run may have failed before this profile)"
            fi
          }
          {
            echo "## Nightly — camunda-hub negative tests"
            summarize secured
            summarize rbac
            echo ""
            echo "_Positive (lifecycle) tests skipped until camunda/camunda-hub#25146._"
            echo "_~102 secured failures are known generator-gap false-positives (#352/#363/#372)._"
          } >> "$GITHUB_STEP_SUMMARY"

      # TEMP: Slack notification disabled for now. To re-enable: add a SLACK_BOT_TOKEN
      # repo secret (or Vault SLACK_CORE_DOMAIN_BOT_TOKEN), map it into the job env,
      # invite the bot to #prj-qa-sandbox, and uncomment this step (point token: at it).
      # - name: Notify Slack
      #   if: ${{ always() && env.SLACK_BOT_TOKEN != '' }}
      #   uses: slackapi/slack-github-action@v2
      #   with:
      #     method: chat.postMessage
      #     token: ${{ env.SLACK_BOT_TOKEN }}
      #     payload: |
      #       {
      #         "channel": "${{ env.SLACK_CHANNEL }}",
      #         "text": "*Nightly — camunda-hub negative tests* — ${{ job.status == 'success' && '✅ passed' || '❌ failed' }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run log + report artifact>"
      #       }
