name: Refresh ontology diagrams

# The committed ontology/diagrams/*.mmd files are derived from the ABox/TBox
# JSON. We do NOT enforce drift per-PR (that pattern poisons every concurrent
# open PR whenever an ontology change merges). Instead, this workflow keeps
# the committed snapshots fresh by regenerating after every push to main and
# opening a self-contained chore PR if the regenerated output differs from
# what's committed. The schedule trigger is a nightly safety net in case the
# push trigger ever fails silently.

on:
  push:
    branches:
      - main
    paths:
      - 'configs/*/ontology/**'
      - 'path-analyser/src/ontology/**'
      - 'scripts/visualise-ontology.ts'
      - 'scripts/export-ontology.ts'
      - 'ontology/diagrams/**'
      - '.github/workflows/refresh-ontology-diagrams.yml'
  schedule:
    # Daily at 06:00 UTC. Safety net only — the push trigger above is the
    # primary path. If the push trigger ever fails the cron run catches it
    # within 24h.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  # Serialise; never run two refreshes against the same target branch.
  group: refresh-ontology-diagrams-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    name: Regenerate ontology diagrams and open PR if drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Regenerate diagrams
        run: npm run viz:ontology

      - name: Open chore PR if diagrams drifted
        # The action no-ops cleanly when there are no changes, and re-uses
        # the existing branch (force-pushes) if a prior run already opened
        # a PR — so we don't get a storm of stacked refresh PRs.
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            ontology/diagrams/**
          branch: chore/refresh-ontology-diagrams
          delete-branch: true
          commit-message: |
            chore: refresh ontology diagrams

            Auto-regenerated by .github/workflows/refresh-ontology-diagrams.yml
            after an ontology change merged to main (or as a nightly safety
            net).
          title: 'chore: refresh ontology diagrams'
          body: |
            Auto-generated by the `Refresh ontology diagrams` workflow.

            The committed `ontology/diagrams/*.mmd` files drifted from what
            the emitter (`npm run viz:ontology`) produces against the
            current ABox/TBox. This PR brings them back in sync.

            Diff is restricted to `ontology/diagrams/**`. Safe to merge
            once CI is green.
          labels: |
            chore
            auto-generated
